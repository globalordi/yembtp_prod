name: Deploy to OVH (yembtp.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh-deploy:
    name: Deploy via SSH/rsync
    runs-on: ubuntu-latest
    env:
      # easingthemes/ssh-deploy@v5.1.0 ciblait Node 20 ; GitHub force Node 24
      # depuis 2025-09 ce qui casse l'invocation rsync (newline → /bin/sh: --rsh: not found).
      # On reste sur Node 20 jusqu'à upgrade de l'action.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.OVH_SSH_HOST }}
          REMOTE_USER: ${{ secrets.OVH_SSH_USER }}
          REMOTE_PORT: ${{ secrets.OVH_SSH_PORT }}
          SOURCE: "./"
          TARGET: ${{ secrets.OVH_SSH_TARGET }}
          ARGS: "-rltzvO --no-perms --no-times"
          EXCLUDE: ".git/, .github/, .DS_Store, .claude/, README.md"
