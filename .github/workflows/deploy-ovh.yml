name: Deploy to OVH (yembtp.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh-deploy:
    name: Deploy via SSH/rsync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.OVH_SSH_PORT }}" "${{ secrets.OVH_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync deploy
        run: |
          rsync -rltzvO --no-perms --no-times \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.OVH_SSH_PORT }}" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='.claude/' \
            --exclude='README.md' \
            ./ "${{ secrets.OVH_SSH_USER }}@${{ secrets.OVH_SSH_HOST }}:${{ secrets.OVH_SSH_TARGET }}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
