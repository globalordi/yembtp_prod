name: Deploy to OVH (yembtp.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh-deploy:
    name: Deploy via SSH/rsync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Smoke test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.OVH_SSH_PORT }}" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              "${{ secrets.OVH_SSH_USER }}@${{ secrets.OVH_SSH_HOST }}" \
              "echo OK; pwd; ls -la"

      - name: Rsync deploy
        run: |
          rsync -rltzvO --no-perms --no-times \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.OVH_SSH_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='.claude/' \
            --exclude='README.md' \
            ./ "${{ secrets.OVH_SSH_USER }}@${{ secrets.OVH_SSH_HOST }}:${{ secrets.OVH_SSH_TARGET }}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
