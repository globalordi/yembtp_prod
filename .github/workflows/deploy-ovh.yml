name: Deploy to OVH (yembtp.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh-deploy:
    name: Deploy via SSH/rsync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.OVH_SSH_HOST }}
          REMOTE_USER: ${{ secrets.OVH_SSH_USER }}
          REMOTE_PORT: ${{ secrets.OVH_SSH_PORT }}
          SOURCE: "./"
          TARGET: ${{ secrets.OVH_SSH_TARGET }}
          ARGS: "-rltzvO --no-perms --no-times"
          EXCLUDE: ".git/, .github/, .DS_Store, .claude/, README.md"
